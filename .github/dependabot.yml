version: 2
updates:
  # npm dependencies — monthly, low-noise. Minor + patch bumps are grouped into a
  # single PR; major bumps (e.g. a wxt/vite/vue-i18n jump) open separately so they
  # get a deliberate review. Every PR is gated by the CI workflow.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows — one grouped PR a month.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions-all:
        patterns:
          - "*"
