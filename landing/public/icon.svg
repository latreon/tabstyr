<?xml version="1.0" encoding="UTF-8"?>
<!-- TabStyr brand mark: plate-less progress ring + clock hands (matches components/RingLogo.vue). -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ring" x1="0.1" y1="0" x2="0.95" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- track -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3a3a4a" stroke-width="9"/>
  <!-- progress arc (~75%), rounded -->
  <path d="M 32 10 A 22 22 0 1 1 13.4 43" fill="none" stroke="url(#ring)" stroke-width="9" stroke-linecap="round"/>
  <!-- hands (brand accent #8b8bfa, matches RingLogo + promo mark) -->
  <line x1="32" y1="32" x2="32" y2="19" stroke="#8b8bfa" stroke-width="6" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="41" y2="37" stroke="#8b8bfa" stroke-width="6" stroke-linecap="round"/>
</svg>
