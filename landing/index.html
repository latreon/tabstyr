<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabStyr — Private browser time tracking</title>
    <meta
      name="description"
      content="See where your browser time really goes — active time per site, trends, heatmaps, focus, and stale-tab nudges. 100% local. 0 bytes leave your device."
    />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tabstyr.com/" />

    <!-- hreflang alternates for the home page (11 locales). The SPA refreshes these
         per-route at runtime; these static tags cover crawlers that don't run JS.
         English is the x-default, served at the un-prefixed root. -->
    <link rel="alternate" hreflang="x-default" href="https://tabstyr.com/" />
    <link rel="alternate" hreflang="en" href="https://tabstyr.com/" />
    <link rel="alternate" hreflang="es" href="https://tabstyr.com/es" />
    <link rel="alternate" hreflang="de" href="https://tabstyr.com/de" />
    <link rel="alternate" hreflang="fr" href="https://tabstyr.com/fr" />
    <link rel="alternate" hreflang="it" href="https://tabstyr.com/it" />
    <link rel="alternate" hreflang="pt-BR" href="https://tabstyr.com/pt-br" />
    <link rel="alternate" hreflang="ru" href="https://tabstyr.com/ru" />
    <link rel="alternate" hreflang="tr" href="https://tabstyr.com/tr" />
    <link rel="alternate" hreflang="ja" href="https://tabstyr.com/ja" />
    <link rel="alternate" hreflang="ko" href="https://tabstyr.com/ko" />
    <link rel="alternate" hreflang="zh-CN" href="https://tabstyr.com/zh-cn" />

    <!-- Open Graph / social (absolute URLs — crawlers don't resolve relative paths) -->
    <meta property="og:title" content="TabStyr — Private browser time tracking" />
    <meta property="og:description" content="Active time per site, trends, heatmaps, focus. 100% local — nothing leaves your device." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TabStyr" />
    <meta property="og:url" content="https://tabstyr.com/" />
    <meta property="og:image" content="https://tabstyr.com/shots/dashboard-dark.png" />
    <meta property="og:image:width" content="1120" />
    <meta property="og:image:height" content="700" />
    <meta property="og:image:alt" content="The TabStyr dashboard: active time per site, trends and an activity heatmap." />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TabStyr — Private browser time tracking" />
    <meta name="twitter:description" content="Active time per site, trends, heatmaps, focus. 100% local — nothing leaves your device." />
    <meta name="twitter:image" content="https://tabstyr.com/shots/dashboard-dark.png" />

    <link rel="icon" type="image/png" href="./icon-128.png" />
    <!-- Fonts are self-hosted (bundled via @fontsource and imported in main.ts),
         so there is no render-blocking request to Google Fonts on first paint. -->
    <noscript>
      <!-- If JS is unavailable, never hide content behind the scroll-reveal. -->
      <style>.reveal { opacity: 1 !important; transform: none !important; }</style>
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
